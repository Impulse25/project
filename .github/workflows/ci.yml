name: PHP Code Quality Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Скачать код из репозитория
      - name: Checkout code
        uses: actions/checkout@v3

      # Шаг 2: Установить PHP нужной версии вместе с PHPCS
      # (в репозитории нет composer.json — раньше composer install падал
      # с самого начала, до любых реальных проверок)
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: phpcs

      # Шаг 3: Проверка синтаксиса PHP во всех .php файлах.
      # find -exec не пробрасывает код выхода дочерней команды наружу,
      # поэтому ошибки синтаксиса раньше не роняли билд — теперь код
      # выхода php -l проверяется явно для каждого файла.
      - name: PHP Lint (syntax check)
        run: |
          fail=0
          while IFS= read -r -d '' file; do
            if ! php -l "$file" > /tmp/lint_out 2>&1; then
              cat /tmp/lint_out
              fail=1
            fi
          done < <(find . -name "*.php" -not -path "./vendor/*" -not -path "./edu/vendor/*" -print0)
          if [ "$fail" -eq 1 ]; then
            echo 'PHP Lint failed: syntax errors found!'
            exit 1
          fi
          echo 'PHP Lint completed successfully!'

      # Шаг 4: Проверка стиля кода по стандарту PSR-12 (конфиг в phpcs.xml.dist).
      # Не блокирует сборку: кодовая база — набор шаблонов со смешанным
      # HTML/PHP и пока не приведена к PSR-12, но отчёт остаётся видимым.
      - name: PHP CodeSniffer (code style)
        continue-on-error: true
        run: phpcs
