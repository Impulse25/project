name: PHP Checks
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  php-lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
      - name: Check PHP syntax
        run: |
          fail=0
          while IFS= read -r -d '' file; do
            if ! php -l "$file" > /tmp/lint_out 2>&1; then
              cat /tmp/lint_out
              fail=1
            fi
          done < <(find . -name '*.php' -not -path './vendor/*' -not -path './edu/vendor/*' -print0)
          if [ "$fail" -eq 1 ]; then
            echo 'PHP syntax errors found!'
            exit 1
          fi
          echo 'All PHP files passed syntax check!'

  phpcs:
    name: Code Style Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup PHP with PHPCS
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: phpcs
      - name: Run PHPCS
        continue-on-error: true
        run: phpcs
          
